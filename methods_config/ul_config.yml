DATASET_DIR: "$DATASET_DIR" #'/users/cmenghin/data/bats/datasets/classification' # '/Users/menga/Desktop/github/zsl_taglets/development' #
DATASET_NAME: "$DATASET_NAME"
# Training Paradigm
PARADIGM: 'UL'
# Textual encoder
# Model
MODALITY: 'text'
# Visual ecoder
VIS_ENCODER: "$VIS_ENCODER"
# Prompt template
PROMPT_TEMPLATE: 'imported in main.py'
# Number of shats per classes in SSL
N_LABEL: 0
N_KEY_SAMPLES: 2
N_MAIN_SAMPLES: 16
MAX_MAIN_RATIO: 0.8
ALPHA: 0.3
# Prefix size
PREFIX_SIZE: 16
N_PSEUDOSHOTS: 8
STEP_QUANTILE: 10
# Prefix initialization: normal/uniform
VIS_PREFIX_INIT: "normal"
# Initialization mean and variance
MEAN_INIT: 0
VAR_INIT: 0.02
# Seeed to separate train and validation
validation_seed: 0
# Ratio validation
ratio_train_val: 1.0
# Batch size
BATCH_SIZE: 32
# Number of epochs
EPOCHS: 50
# Iteration per epoch
ITER_PER_EPOCH: 50
# Scheduler
SCHEDULER: "cosine"
# Scheduler warmup epochs
WARMUP_EPOCHS: 1
WARMUP_LR: 0.001
# Number of accumulation iter
ACCUMULATION_ITER: 1
# Optimizer teacher
OPTIM: "SGD"
LR: "$LR"
DECAY: 0.1
STEP_SIZE: 1
# Set seeds
OPTIM_SEED: "$OPTIM_SEED"
# Classes split
CLASSES_SPLIT: SPLIT_SEED
# Seed split
SPLIT_SEED: "$SPLIT_SEED"
# Debiasing
DEBIASING: False

ITER_EPOCHS: 5
MARGIN_SCALE: "$MARGIN_SCALE"
THRESHOLD: 0.85

# config below is for maple
INPUTSIZE: (224, 224)
INTERPOLATION: "bicubic"
PIXEL_MEAN: [0.48145466, 0.4578275, 0.40821073]
PIXEL_STD: [0.26862954, 0.26130258, 0.27577711]
TRANSFORMS: ["random_resized_crop", "random_flip", "normalize"]


BACKBONE: "ViT-B/32"


N_CTX: 2
CTX_INIT: "a photo of a"
PREC: "fp16"
PROMPT_DEPTH: 8